name: Deploy to Vercel

# Only deploy after CI succeeds on main. A failed lint/type-check/test/build
# must not be allowed to apply migrations or ship code to production.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    # Skip when the upstream CI run failed; allow manual dispatch unconditionally.
    if: >-
      ${{ github.event_name == 'workflow_dispatch' ||
          github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4
        with:
          # When triggered by workflow_run, default ref is the workflow file's
          # branch — explicitly check out the SHA that CI just succeeded on.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Prisma Migrate
        run: bunx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to production
        id: deploy
        run: |
          URL=$(vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to $URL"

      # Verifies the deployment is actually serving traffic and that the
      # database is reachable. Health endpoint returns 503 on DB failure, so a
      # successful curl here is a real readiness signal — not just "the build
      # uploaded." Retries cover Vercel's brief edge-propagation window.
      - name: Health check
        run: |
          HEALTH_URL="${{ steps.deploy.outputs.url }}/api/health"
          echo "Probing $HEALTH_URL"
          curl --fail --show-error --silent \
            --retry 5 --retry-delay 5 --retry-all-errors \
            --max-time 15 \
            "$HEALTH_URL"
